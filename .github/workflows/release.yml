name: Release

on:
  push:
    branches:
      - main
      - beta
      - alpha

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  # Job 1: Determine next version using semantic-release (dry-run)
  version:
    name: Determine Version
    runs-on: ubuntu-latest
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Semantic Release (Dry Run)
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          dry_run: true
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
            conventional-changelog-conventionalcommits
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Output Version Info
        run: |
          echo "New release published: ${{ steps.semantic.outputs.new_release_published }}"
          echo "New release version: ${{ steps.semantic.outputs.new_release_version }}"

  # Job 2: Build binaries with version
  build:
    name: Build Binaries
    needs: version
    if: needs.version.outputs.new_release_published == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            output: exca-studio-linux-amd64
          - goos: linux
            goarch: arm64
            output: exca-studio-linux-arm64
          - goos: darwin
            goarch: amd64
            output: exca-studio-darwin-amd64
          - goos: darwin
            goarch: arm64
            output: exca-studio-darwin-arm64
          - goos: windows
            goarch: amd64
            output: exca-studio-windows-amd64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: backend/go.sum

      - name: Build Frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Copy Frontend to Backend
        run: cp -r frontend/dist/* backend/web/

      - name: Build Binary
        working-directory: backend
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          VERSION: ${{ needs.version.outputs.new_release_version }}
        run: |
          mkdir -p ../dist
          go build -ldflags="-s -w \
            -X main.Version=${VERSION} \
            -X main.GitCommit=$(git rev-parse --short HEAD) \
            -X main.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o ../dist/${{ matrix.output }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: dist/${{ matrix.output }}
          retention-days: 1

  # Job 3: Create checksums and release
  release:
    name: Create Release
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p dist release
          find artifacts -type f -exec cp {} dist/ \;
          ls -lah dist/

      - name: Make binaries executable
        run: chmod +x dist/*

      - name: Create tar.gz archives
        run: |
          cd dist
          for binary in *; do
            if [ -f "$binary" ] && [[ "$binary" != *.tar.gz ]] && [[ "$binary" != checksums.txt ]]; then
              os=$(echo $binary | sed 's/exca-studio-//' | cut -d- -f1)
              arch=$(echo $binary | sed 's/exca-studio-//' | cut -d- -f2 | sed 's/\.exe$//')
              if [ "$arch" = "amd64" ]; then arch="x86_64"; fi
              if [ "$arch" = "arm64" ]; then arch="aarch64"; fi
              archive_name="exca-studio_${{ needs.version.outputs.new_release_version }}_${os}_${arch}.tar.gz"
              if [[ "$binary" == *.exe ]]; then
                cp "$binary" exca-studio.exe
                tar -czf ../release/$archive_name exca-studio.exe
                rm exca-studio.exe
              else
                cp "$binary" exca-studio
                tar -czf ../release/$archive_name exca-studio
                rm exca-studio
              fi
            fi
          done
          cd ..
          ls -lah release/

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
            conventional-changelog-conventionalcommits
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Job 4: Docker build & push to GHCR (per-arch, using pre-built binaries)
  docker:
    name: Docker Release
    needs: [version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            artifact: exca-studio-linux-amd64
          - platform: linux/arm64
            artifact: exca-studio-linux-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download pre-built binary
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: backend/

      - name: Make binary executable
        run: |
          mv backend/${{ matrix.artifact }} backend/exca-studio
          chmod +x backend/exca-studio

      - name: Prepare version and tags
        id: version
        run: |
          VERSION="${{ needs.version.outputs.new_release_version }}"
          VERSION=${VERSION#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if [[ ! "$VERSION" =~ "-" ]]; then
            MAJOR=$(echo $VERSION | cut -d. -f1)
            MINOR=$(echo $VERSION | cut -d. -f2)
            echo "is_stable=true" >> $GITHUB_OUTPUT
            echo "major_minor=${MAJOR}.${MINOR}" >> $GITHUB_OUTPUT
          else
            echo "is_stable=false" >> $GITHUB_OUTPUT
          fi

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest,enable=${{ steps.version.outputs.is_stable }}
            type=raw,value=${{ steps.version.outputs.major_minor }},enable=${{ steps.version.outputs.is_stable }}
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true
